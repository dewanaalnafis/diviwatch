<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>DiviWatch Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f1117;--surface:#161b27;--raised:#1e2535;--hover:#242d40;
  --border:#2a3347;--border2:#313d54;
  --txt:#e8edf5;--txt2:#8896b0;--txt3:#4e5d78;
  --blue:#3b82f6;--blue-d:#1d3a6e;--blue-t:#93c5fd;
  --green:#22c55e;--green-d:#14532d;--green-t:#86efac;
  --amber:#f59e0b;--amber-d:#78350f;--amber-t:#fcd34d;
  --red:#ef4444;--red-d:#7f1d1d;--red-t:#fca5a5;
  --purple:#8b5cf6;--purple-d:#4c1d95;--purple-t:#c4b5fd;
  --r-sm:4px;--r-md:7px;--r-lg:10px;
}
html,body{height:100%;background:var(--bg);color:var(--txt);font-family:'DM Sans',sans-serif;font-size:14px;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:99px}
#app{display:grid;grid-template-rows:52px auto 1fr;height:100vh;overflow:hidden}
header{display:flex;align-items:center;justify-content:space-between;padding:0 20px;border-bottom:1px solid var(--border);background:var(--surface)}
.logo{display:flex;align-items:center;gap:9px}
.logo-mark{width:26px;height:26px;background:var(--blue);border-radius:var(--r-sm);display:flex;align-items:center;justify-content:center}
.logo-mark svg{width:14px;height:14px;color:#fff}
.logo-txt{font-size:15px;font-weight:600;letter-spacing:-.3px}
.logo-txt span{color:var(--blue)}
.hdr-meta{font-size:11px;color:var(--txt3);font-family:'DM Mono',monospace}
.hdr-right{display:flex;align-items:center;gap:8px}
.live{display:flex;align-items:center;gap:5px}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:blink 2s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.live-txt{font-size:11px;color:var(--green-t);font-family:'DM Mono',monospace}
.btn{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;border-radius:var(--r-md);font-size:13px;font-family:'DM Sans',sans-serif;font-weight:500;cursor:pointer;border:1px solid var(--border2);background:var(--raised);color:var(--txt2);transition:.12s}
.btn:hover{background:var(--hover);color:var(--txt)}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn svg{width:13px;height:13px}
.btn-spin svg{animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#toolbar{padding:12px 20px;border-bottom:1px solid var(--border);background:var(--surface);display:flex;flex-direction:column;gap:12px}
.row{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.tgl-group{display:flex;background:var(--bg);border:1px solid var(--border);border-radius:var(--r-md);padding:3px;gap:2px}
.tgl{padding:4px 14px;border-radius:5px;font-size:12px;font-weight:500;font-family:'DM Sans',sans-serif;cursor:pointer;border:none;background:transparent;color:var(--txt2);transition:.12s}
.tgl:hover{color:var(--txt);background:var(--raised)}
.tgl.on{background:var(--blue);color:#fff}
.srch-wrap{position:relative;min-width:160px;max-width:220px}
.srch-wrap svg{position:absolute;left:9px;top:50%;transform:translateY(-50%);width:13px;height:13px;color:var(--txt3);pointer-events:none}
input.srch{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:var(--r-md);padding:5px 10px 5px 30px;font-size:13px;font-family:'DM Sans',sans-serif;color:var(--txt);outline:none}
input.srch::placeholder{color:var(--txt3)}
input.srch:focus{border-color:var(--blue)}
select.sel{background:var(--bg);border:1px solid var(--border);border-radius:var(--r-md);padding:5px 10px;font-size:13px;font-family:'DM Sans',sans-serif;color:var(--txt2);outline:none;cursor:pointer}
select.sel:focus{border-color:var(--blue);color:var(--txt)}
.metrics{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}
.mc{background:var(--bg);border:1px solid var(--border);border-radius:var(--r-lg);padding:10px 14px}
.mc-lbl{font-size:11px;color:var(--txt3);text-transform:uppercase;letter-spacing:.5px}
.mc-val{font-size:22px;font-weight:600;font-family:'DM Mono',monospace;letter-spacing:-.5px;margin-top:2px}
.mc-sub{font-size:11px;color:var(--txt3);margin-top:1px}
.c-blue{color:var(--blue-t)}.c-green{color:var(--green-t)}.c-amber{color:var(--amber-t)}.c-red{color:var(--red-t)}
#main{display:grid;grid-template-columns:55% 45%;overflow:hidden}
#left{display:flex;flex-direction:column;border-right:1px solid var(--border);overflow:hidden}
.ph{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0}
.ph-title{font-size:13px;font-weight:600;display:flex;align-items:center;gap:7px}
.ph-title svg{width:14px;height:14px;color:var(--blue)}
.ph-count{font-size:11px;color:var(--txt3);font-family:'DM Mono',monospace}
.tbl-wrap{flex:1;overflow-y:auto}
table{width:100%;border-collapse:collapse;table-layout:fixed}
thead{position:sticky;top:0;z-index:2}
thead tr{background:var(--surface)}
th{padding:7px 10px;font-size:11px;font-weight:500;color:var(--txt3);text-align:left;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border);white-space:nowrap}
th.r{text-align:right}
tbody tr{cursor:pointer;border-bottom:1px solid var(--border);transition:.1s}
tbody tr:hover{background:var(--raised)}
tbody tr.sel{background:var(--raised);border-left:2px solid var(--blue)}
td{padding:8px 10px;font-size:13px;color:var(--txt);white-space:nowrap}
td.r{text-align:right}
.mono{font-family:'DM Mono',monospace}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:99px;font-size:11px;font-weight:500;white-space:nowrap}
.sb{background:var(--green-d);color:var(--green-t)}.b{background:var(--blue-d);color:var(--blue-t)}
.w{background:var(--amber-d);color:var(--amber-t)}.sk{background:var(--red-d);color:var(--red-t)}
.badge-flag{background:var(--raised);color:var(--txt3);border:1px solid var(--border);font-size:10px}
.sbar{display:flex;align-items:center;gap:6px;justify-content:flex-end}
.sbar-bg{width:44px;height:4px;background:var(--raised);border-radius:99px;overflow:hidden}
.sbar-fill{height:100%;border-radius:99px}
.fg{background:var(--green)}.fb{background:var(--blue)}.fa{background:var(--amber)}.fr{background:var(--red)}
.snum{font-size:12px;font-family:'DM Mono',monospace;color:var(--txt2);min-width:30px;text-align:right}
#right{display:flex;flex-direction:column;overflow:hidden;background:var(--surface)}
.placeholder{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;color:var(--txt3);padding:40px;text-align:center}
.placeholder svg{width:40px;height:40px;opacity:.2}
.placeholder h3{font-size:14px;font-weight:500;color:var(--txt2)}
.placeholder p{font-size:12px;line-height:1.6;max-width:220px}
.d-hdr{padding:14px 16px;border-bottom:1px solid var(--border);flex-shrink:0}
.d-title-row{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:4px}
.d-kode{font-size:20px;font-weight:600;letter-spacing:-.5px}
.d-nama{font-size:11px;color:var(--txt2);margin-bottom:8px}
.d-price-row{display:flex;align-items:baseline;gap:10px}
.d-price{font-size:22px;font-weight:600;font-family:'DM Mono',monospace}
.d-change{font-size:13px}
.tabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0}
.tab{flex:1;padding:9px 4px;font-size:11px;font-weight:500;font-family:'DM Sans',sans-serif;cursor:pointer;border:none;background:transparent;color:var(--txt3);border-bottom:2px solid transparent;transition:.12s;text-align:center}
.tab:hover{color:var(--txt2);background:var(--raised)}
.tab.on{color:var(--blue-t);border-bottom-color:var(--blue)}
.tab-content{flex:1;overflow-y:auto;padding:14px 16px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px}
.kpi{background:var(--raised);border:1px solid var(--border);border-radius:var(--r-md);padding:10px 12px}
.kpi-lbl{font-size:10px;color:var(--txt3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px}
.kpi-val{font-size:16px;font-weight:600;font-family:'DM Mono',monospace}
.sec{font-size:11px;font-weight:600;color:var(--txt3);text-transform:uppercase;letter-spacing:.5px;margin:14px 0 8px}
.chk-item{display:flex;align-items:center;justify-content:space-between;padding:5px 9px;border-radius:var(--r-sm);margin-bottom:3px;font-size:12px}
.chk-item.pass{background:rgba(34,197,94,.07)}.chk-item.fail{background:rgba(239,68,68,.05)}
.chk-lbl{color:var(--txt2)}
.chk-pass{color:var(--green-t);font-size:11px;font-weight:500;white-space:nowrap;margin-left:8px}
.chk-fail{color:var(--red-t);font-size:11px;white-space:nowrap;margin-left:8px}
.ew-wrap{background:var(--raised);border:1px solid var(--border);border-radius:var(--r-md);padding:12px;margin-bottom:14px}
.ew-title{font-size:11px;color:var(--txt3);margin-bottom:10px;display:flex;align-items:center;justify-content:space-between}
.ew-track{position:relative;height:8px;background:var(--bg);border-radius:99px;margin:12px 0 6px}
.ew-window{position:absolute;height:100%;border-radius:99px;background:rgba(59,130,246,.35)}
.ew-marker{position:absolute;top:50%;transform:translate(-50%,-50%);width:14px;height:14px;border-radius:50%;border:2px solid var(--bg)}
.ew-labels{display:flex;justify-content:space-between;font-size:10px;color:var(--txt3);font-family:'DM Mono',monospace}
.ew-status{display:inline-flex;align-items:center;padding:2px 8px;border-radius:99px;font-size:11px;font-weight:600}
.chart-wrap{background:var(--raised);border:1px solid var(--border);border-radius:var(--r-md);padding:12px;margin-bottom:14px}
.chart-canvas{width:100% !important;height:180px !important}
.chart-canvas-sm{width:100% !important;height:140px !important}
.div-timeline{display:flex;flex-direction:column;gap:6px}
.div-event{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:var(--r-md);border:1px solid var(--border);background:var(--raised)}
.div-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.div-info{flex:1}.div-date{font-size:12px;font-weight:500}.div-label{font-size:10px;color:var(--txt3)}
.div-days{font-size:12px;font-family:'DM Mono',monospace;font-weight:600}
.flags-wrap{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}
.flag-item{background:var(--amber-d);color:var(--amber-t);border-radius:var(--r-sm);padding:3px 8px;font-size:11px}
.d-footer{padding:10px 16px;border-top:1px solid var(--border);flex-shrink:0}
#loading{display:flex;align-items:center;justify-content:center;height:100%;flex-direction:column;gap:12px;color:var(--txt3)}
.spin-icon{width:24px;height:24px;border:2px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite}
.spark{display:block}
</style>
</head>
<body>
<div id="app">

<header>
  <div class="logo">
    <div class="logo-mark">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
      </svg>
    </div>
    <span class="logo-txt">Divi<span>Watch</span></span>
  </div>
  <span class="hdr-meta" id="gen-at">Memuat...</span>
  <div class="hdr-right">
    <div class="live"><div class="live-dot"></div><span class="live-txt">IDX Dividend Screener</span></div>
    <button class="btn" id="btn-refresh" onclick="refreshData()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
      </svg>Refresh
    </button>
  </div>
</header>

<div id="toolbar">
  <div class="row">
    <div class="tgl-group">
      <button class="tgl on" id="f-all"   onclick="setFilter('all')">Semua</button>
      <button class="tgl"    id="f-sb"    onclick="setFilter('STRONG BUY')">Strong Buy</button>
      <button class="tgl"    id="f-buy"   onclick="setFilter('BUY')">Buy</button>
      <button class="tgl"    id="f-watch" onclick="setFilter('WATCH')">Watch</button>
    </div>
    <div class="srch-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
      </svg>
      <input class="srch" type="text" placeholder="Cari kode..." id="srch" oninput="render()">
    </div>
    <select class="sel" id="sort" onchange="render()">
      <option value="skor">Sort: Score</option>
      <option value="yield">Sort: Yield Bersih</option>
      <option value="rsi">Sort: RSI</option>
      <option value="cum">Sort: Cum Date Terdekat</option>
    </select>
    <span style="margin-left:auto;font-size:11px;color:var(--txt3);font-family:'DM Mono',monospace" id="count-lbl"></span>
  </div>
  <div class="metrics" id="metrics"></div>
</div>

<div id="main">
  <div id="left">
    <div class="ph">
      <span class="ph-title">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
        </svg>Hasil Screening
      </span>
      <span class="ph-count" id="tbl-count"></span>
    </div>
    <div class="tbl-wrap">
      <div id="loading"><div class="spin-icon"></div><span>Memuat candidates.json...</span></div>
      <table id="tbl" style="display:none">
        <thead>
          <tr>
            <th style="width:18%">Kode</th><th style="width:16%">Klasifikasi</th>
            <th class="r" style="width:9%">Yield</th><th class="r" style="width:7%">RSI</th>
            <th style="width:10%">Trend</th><th class="r" style="width:13%">Cum Date</th><th class="r" style="width:12%">Score</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </div>

  <div id="right">
    <div id="detail-placeholder" class="placeholder">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M13 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V9z"/>
        <polyline points="13 2 13 9 20 9"/>
      </svg>
      <h3>Pilih saham untuk melihat detail</h3>
      <p>Klik baris di tabel kiri untuk melihat analisis lengkap.</p>
    </div>

    <div id="detail-panel" style="display:none;flex:1;display:none;flex-direction:column;overflow:hidden">
      <div class="d-hdr">
        <div class="d-title-row">
          <div>
            <span class="d-kode" id="d-kode"></span>
            <span id="d-badge" style="margin-left:8px"></span>
          </div>
          <button class="btn" onclick="closeDetail()" style="padding:3px 8px">✕</button>
        </div>
        <div class="d-nama" id="d-nama"></div>
        <div class="d-price-row">
          <span class="d-price" id="d-price"></span>
          <span class="d-change" id="d-change"></span>
          <span style="font-size:11px;color:var(--txt3);margin-left:4px" id="d-sektor"></span>
        </div>
      </div>

      <div class="tabs">
        <button class="tab on" id="tab-ringkasan" onclick="switchTab('ringkasan')">Ringkasan</button>
        <button class="tab"    id="tab-dividen"   onclick="switchTab('dividen')">Dividen</button>
        <button class="tab"    id="tab-teknikal"  onclick="switchTab('teknikal')">Teknikal</button>
        <button class="tab"    id="tab-news"      onclick="switchTab('news')">News</button>
      </div>

      <div class="tab-content" id="tab-body"></div>

      <div class="d-footer">
        <button class="btn" style="width:100%;justify-content:center;font-size:12px" onclick="refreshData()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
          </svg>Update semua data (scrape + score ulang)
        </button>
      </div>
    </div>
  </div>
</div>
</div>

<script>
let allData=[],filtered=[],selStock=null,curFilter='all',curTab='ringkasan',chartPrice=null,chartDiv=null;

const CHECKS={
  yield_bersih_4pct:'Yield bersih ≥ 4%',yield_tidak_abnormal:'Yield tidak abnormal',
  div_konsisten_3thn:'Dividen konsisten ≥ 3 tahun',div_konsisten_5thn:'Dividen konsisten ≥ 5 tahun',
  dividen_aktif:'Dividen aktif (≤ 1 tahun lalu)',pbv_wajar:'PBV wajar',per_wajar:'PER wajar (0–25×)',
  roe_positif:'ROE ≥ 10%',der_aman:'DER aman',above_ma20:'Harga di atas MA20',above_ma50:'Harga di atas MA50',
  golden_cross:'Golden cross MA20 > MA50',rsi_ideal:'RSI zona ideal (40–65)',
  rsi_tidak_overbought:'RSI tidak overbought (< 70)',macd_bullish:'MACD bullish',
  volume_normal:'Volume normal (≥ 1×)',volume_momentum:'Volume momentum (≥ 1.5×)',
  candle_bullish:'Candle bullish',candle_body_kuat:'Body candle kuat (≥ 40%)',
  upcoming_dividen:'Potensi dividen berikutnya',
  news_positif:'Berita/sentimen positif',news_tidak_major_neg:'Tidak ada berita major negatif',
};

function klasBadge(k){const m={'STRONG BUY':'sb','BUY':'b','WATCH':'w','SKIP':'sk'};return `<span class="badge ${m[k]||'sk'}">${k}</span>`;}
function fillClass(p){if(p>=75)return 'fg';if(p>=60)return 'fb';if(p>=45)return 'fa';return 'fr';}
function fmtRp(n){return 'Rp '+(n||0).toLocaleString('id-ID');}
function fmtDate(s){if(!s)return '—';try{return new Date(s).toLocaleDateString('id-ID',{day:'numeric',month:'short',year:'numeric'});}catch{return s;}}
function daysLabel(d){if(d===null||d===undefined)return '—';if(d>0)return `${d} hari lagi`;if(d===0)return 'Hari ini';return `${Math.abs(d)} hari lalu`;}
function estimateNextCum(stock){
  if(!stock.cum_date)return null;
  const last=new Date(stock.cum_date),today=new Date();
  if(last>today)return last;
  const next=new Date(last);next.setFullYear(next.getFullYear()+1);return next;
}
function daysFrom(dt){if(!dt)return null;const t=new Date();t.setHours(0,0,0,0);return Math.round((dt-t)/86400000);}
function ewStatus(d){
  if(d===null)return{label:'—',color:'var(--txt3)',WS:45,WE:20};
  const WS=45,WE=20;
  if(d<=0)return{label:'TERLEWAT',color:'var(--red-t)',WS,WE};
  if(d<=WE)return{label:'URGENT',color:'var(--red-t)',WS,WE};
  if(d<=WS)return{label:'AKTIF',color:'var(--green-t)',WS,WE};
  if(d<=WS+14)return{label:'MENDEKATI',color:'var(--blue-t)',WS,WE};
  return{label:'JAUH',color:'var(--txt3)',WS,WE};
}
function sparkline(prices,w=70,h=28){
  if(!prices||prices.length<2)return `<svg width="${w}" height="${h}"></svg>`;
  const vals=prices.map(p=>p.close||p),mn=Math.min(...vals),mx=Math.max(...vals),range=mx-mn||1;
  const pts=vals.map((v,i)=>`${((i/(vals.length-1))*w).toFixed(1)},${(h-((v-mn)/range)*(h-4)-2).toFixed(1)}`).join(' ');
  const col=vals[vals.length-1]>=vals[0]?'var(--green)':'var(--red)';
  return `<svg class="spark" width="${w}" height="${h}" viewBox="0 0 ${w} ${h}"><polyline points="${pts}" fill="none" stroke="${col}" stroke-width="1.5" stroke-linejoin="round"/></svg>`;
}

async function loadData(){
  try{
    const res=await fetch('https://raw.githubusercontent.com/dewanaalnafis/diviwatch/main/candidates.json?t='+Date.now());
    if(!res.ok)throw new Error('candidates.json tidak ditemukan');
    const json=await res.json();
    allData=[...(json.strong_buy||[]),...(json.buy||[]),...(json.watch||[]),...(json.skip||[])];
    document.getElementById('gen-at').textContent='Update: '+(json.generated_at||'—');
    renderMetrics(json.summary||{});
    document.getElementById('loading').style.display='none';
    document.getElementById('tbl').style.display='table';
    render();
    if(selStock){const u=allData.find(s=>s.kode===selStock.kode);if(u){selStock=u;renderTabContent();}}
  }catch(e){
    document.getElementById('loading').innerHTML=`<span style="color:var(--red-t)">❌ ${e.message}</span>`;
  }
}

async function refreshData(){
  const btn=document.getElementById('btn-refresh');
  btn.disabled=true;btn.classList.add('btn-spin');
  btn.innerHTML=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>Updating...`;
  try{
    const res=await fetch('/api/run');const json=await res.json();
    if(json.status!=='ok')throw new Error(json.msg);await loadData();
  }catch(e){alert('Gagal refresh: '+e.message);}
  finally{
    btn.disabled=false;btn.classList.remove('btn-spin');
    btn.innerHTML=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>Refresh`;
  }
}

function setFilter(f){
  curFilter=f;
  ['all','sb','buy','watch'].forEach(id=>document.getElementById('f-'+id).classList.remove('on'));
  const map={all:'f-all','STRONG BUY':'f-sb',BUY:'f-buy',WATCH:'f-watch'};
  if(map[f])document.getElementById(map[f]).classList.add('on');render();
}

function render(){
  const q=document.getElementById('srch').value.trim().toLowerCase();
  const sort=document.getElementById('sort').value;
  filtered=allData.filter(s=>{
    if(curFilter!=='all'&&s.klasifikasi!==curFilter)return false;
    if(q&&!s.kode.toLowerCase().includes(q)&&!s.nama.toLowerCase().includes(q))return false;
    return true;
  });
  filtered.sort((a,b)=>{
    if(sort==='skor')return b.total_skor-a.total_skor;
    if(sort==='yield')return b.yield_bersih-a.yield_bersih;
    if(sort==='rsi')return a.rsi-b.rsi;
    if(sort==='harga')return b.harga-a.harga;
if(sort==='cum'){
  const da=daysFrom(estimateNextCum(a)),db=daysFrom(estimateNextCum(b));
  if(da===null&&db===null)return 0;
  if(da===null)return 1;
  if(db===null)return -1;
  return da-db;
}
return 0;
  });
  const tbody=document.getElementById('tbody');tbody.innerHTML='';
  filtered.forEach(s=>{
    const tr=document.createElement('tr');
    if(selStock&&s.kode===selStock.kode)tr.classList.add('sel');
    tr.onclick=()=>selectStock(s.kode);
    const pct=s.pct||0,fc=fillClass(pct),spark=sparkline(s.price_history||[]);
    const flags=(s.flags||[]).map(f=>`<span class="badge badge-flag" style="margin-left:3px">${f.replace(/_/g,' ')}</span>`).join('');
    const no=(s.news||{}).overall||'';
    const ndot=no==='major_negative'?`<span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--red);margin-left:4px;vertical-align:middle"></span>`:
               no.includes('positive')?`<span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--green);margin-left:4px;vertical-align:middle"></span>`:'';
    const chg=s.change_pct||0;
    tr.innerHTML=`
      <td><div style="font-weight:600;font-size:13px">${s.kode}${ndot}</div>
          <div style="font-size:10px;color:var(--txt3)">${s.sektor||''}</div>${flags}</td>
      <td>${klasBadge(s.klasifikasi)}</td>
      <td class="r mono" style="${s.yield_bersih>=4?'color:var(--green-t)':''}">${s.yield_bersih}%</td>
      <td class="r mono" style="${s.rsi<40||s.rsi>70?'color:var(--amber-t)':''}">${s.rsi}</td>
      <td style="padding:6px 10px">${spark}</td>
      <td class="r mono" style="font-size:11px">
        ${(()=>{
          const nc=estimateNextCum(s),d=daysFrom(nc);
          if(!nc)return '<span style="color:var(--txt3)">—</span>';
          const col=d<=30?'var(--red-t)':d<=90?'var(--amber-t)':d<=180?'var(--blue-t)':'var(--txt3)';
          return `<span style="color:${col}">${nc.toLocaleDateString('id-ID',{day:'numeric',month:'short'})}</span><br><span style="font-size:10px;color:${col}">${d>0?d+'h lagi':Math.abs(d)+'h lalu'}</span>`;
        })()}
      </td>
      <td class="r"><div class="sbar">
      <td class="r"><div class="sbar"><div class="sbar-bg"><div class="sbar-fill ${fc}" style="width:${pct}%"></div></div><span class="snum">${s.total_skor}/${s.skor_maks}</span></div></td>`;
    tbody.appendChild(tr);
  });
  document.getElementById('tbl-count').textContent=`${filtered.length} saham`;
  document.getElementById('count-lbl').textContent=`${filtered.length} saham`;
}

function selectStock(kode){
  selStock=allData.find(s=>s.kode===kode);if(!selStock)return;
  curTab='ringkasan';render();
  const chg=selStock.change_pct||0;
  document.getElementById('d-kode').textContent=selStock.kode;
  document.getElementById('d-badge').innerHTML=klasBadge(selStock.klasifikasi);
  document.getElementById('d-nama').textContent=selStock.nama;
  document.getElementById('d-price').textContent=fmtRp(selStock.harga);
  document.getElementById('d-change').textContent=(chg>=0?'+':'')+chg.toFixed(1)+'%';
  document.getElementById('d-change').style.color=chg>=0?'var(--green-t)':'var(--red-t)';
  document.getElementById('d-sektor').textContent=selStock.sektor||'';
  document.getElementById('detail-placeholder').style.display='none';
  const panel=document.getElementById('detail-panel');
  panel.style.display='flex';panel.style.flexDirection='column';
  panel.style.overflow='hidden';panel.style.flex='1';
  ['ringkasan','dividen','teknikal','news'].forEach(t=>document.getElementById('tab-'+t).classList.toggle('on',t==='ringkasan'));
  renderTabContent();
}

function closeDetail(){
  selStock=null;destroyCharts();
  document.getElementById('detail-placeholder').style.display='flex';
  document.getElementById('detail-panel').style.display='none';render();
}

function switchTab(tab){
  curTab=tab;destroyCharts();
  ['ringkasan','dividen','teknikal','news'].forEach(t=>document.getElementById('tab-'+t).classList.toggle('on',t===tab));
  renderTabContent();
}

function renderTabContent(){
  if(!selStock)return;
  const body=document.getElementById('tab-body');body.innerHTML='';
  if(curTab==='ringkasan')renderRingkasan(body);
  if(curTab==='dividen')  renderDividen(body);
  if(curTab==='teknikal') renderTeknikal(body);
  if(curTab==='news')     renderNews(body);
}

    <div style="background:var(--raised);border:1px solid var(--border);border-radius:var(--r-md);padding:12px">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;font-size:12px">
        ${[['MA20',`Rp ${(s.ma20||0).toLocaleString('id-ID')}`],['MA50',s.ma50?`Rp ${s.ma50.toLocaleString('id-ID')}`:'—'],
          ['Golden Cross',s.golden_cross?'✓ Ya':'✗ Tidak'],['MACD Bullish',s.macd_bullish?'✓ Ya':'✗ Tidak'],
          ['Candle Bullish',s.bullish_candle?'✓ Ya':'✗ Tidak'],['Body Ratio',`${(s.body_ratio*100).toFixed(0)}%`],
          ['PBV',`${s.pbv}×`],['PER',s.per>0?`${s.per}×`:'—'],['ROE',`${s.roe}%`],['DER',`${s.der}`]
        ].map(([l,v])=>`<span style="color:var(--txt3)">${l}</span><span style="text-align:right;font-family:'DM Mono',monospace;font-weight:500">${v}</span>`).join('')}
      </div>
    </div>`;
  setTimeout(()=>{
    const ctx=document.getElementById('chart-price');if(!ctx)return;
    const ph=s.price_history||[];if(!ph.length)return;destroyCharts();
    const labels=ph.map(p=>p.date.slice(5)),closes=ph.map(p=>p.close),ma20h=s.ma20_history||[],ma50h=s.ma50_history||[];
    chartPrice=new Chart(ctx,{type:'line',data:{labels,datasets:[
      {label:'Harga',data:closes,borderColor:'#3b82f6',backgroundColor:'rgba(59,130,246,.1)',borderWidth:2,pointRadius:0,fill:true,tension:0.3},
      ...(ma20h.length?[{label:'MA20',data:ma20h,borderColor:'#f59e0b',borderWidth:1.5,borderDash:[4,3],pointRadius:0,fill:false,tension:0.3}]:[]),
      ...(ma50h.length?[{label:'MA50',data:ma50h,borderColor:'#8b5cf6',borderWidth:1.5,borderDash:[4,3],pointRadius:0,fill:false,tension:0.3}]:[]),
    ]},options:{responsive:true,maintainAspectRatio:false,interaction:{mode:'index',intersect:false},
      plugins:{legend:{labels:{color:'#8896b0',font:{size:11},boxWidth:12}},tooltip:{callbacks:{label:c=>`${c.dataset.label}: Rp ${(c.raw||0).toLocaleString('id-ID')}`}}},
      scales:{x:{ticks:{color:'#4e5d78',font:{size:10},maxTicksLimit:8},grid:{color:'rgba(255,255,255,.05)'}},
        y:{ticks:{color:'#4e5d78',font:{size:10},callback:v=>`${(v/1000).toFixed(0)}K`},grid:{color:'rgba(255,255,255,.05)'}}}}});
  },50);
}

function renderNews(container){
  const s=selStock,news=s.news||{};
  const overall=news.overall||'no_data',items=news.items||[],matches=news.kategori_match||[],warnings=news.warnings||[];
  const cmap={strong_positive:'var(--green-t)',positive:'var(--green-t)',neutral:'var(--txt3)',negative:'var(--red-t)',strong_negative:'var(--red-t)',major_negative:'var(--red-t)',no_data:'var(--txt3)'};
  const bmap={strong_positive:'var(--green-d)',positive:'var(--green-d)',neutral:'var(--raised)',negative:'var(--red-d)',strong_negative:'var(--red-d)',major_negative:'var(--red-d)',no_data:'var(--raised)'};
  const lmap={strong_positive:'STRONG POSITIVE',positive:'POSITIVE',neutral:'NEUTRAL',negative:'NEGATIVE',strong_negative:'STRONG NEGATIVE',major_negative:'⚠ MAJOR NEGATIVE',no_data:'NO DATA'};
  const oc=cmap[overall]||'var(--txt3)',ob=bmap[overall]||'var(--raised)',ol=lmap[overall]||overall;
  const wHTML=warnings.map(w=>`<div style="padding:8px 10px;background:var(--amber-d);border-radius:var(--r-md);font-size:12px;color:var(--amber-t);margin-bottom:6px">⚠ ${w}</div>`).join('');
  const mHTML=matches.length?matches.map(m=>{
    const ip=m.bobot>0,in_=m.bobot<0,c=ip?'var(--green-t)':in_?'var(--red-t)':'var(--txt3)',b=ip?'var(--green-d)':in_?'var(--red-d)':'var(--raised)';
    return `<div style="display:flex;align-items:center;justify-content:space-between;padding:7px 10px;background:${b};border-radius:var(--r-sm);margin-bottom:4px;font-size:12px">
      <div><span style="font-weight:500;color:${c}">${m.nama}</span><span style="font-size:10px;color:var(--txt3);margin-left:6px">${m.level}</span></div>
      <span style="font-weight:600;color:${c}">${m.bobot>0?'+':''}${m.bobot}</span></div>`;
  }).join(''):`<div style="font-size:12px;color:var(--txt3)">Tidak ada kategori yang match</div>`;
  const hHTML=items.length?items.map(item=>{
    const im=item.matches||[],hb=im.some(m=>m.sentimen==='bullish'),hbr=im.some(m=>m.sentimen==='bearish');
    const dot=hb?'var(--green)':hbr?'var(--red)':'var(--txt3)';
    return `<div style="display:flex;gap:8px;padding:8px 0;border-bottom:1px solid var(--border)">
      <div style="width:7px;height:7px;border-radius:50%;background:${dot};flex-shrink:0;margin-top:5px"></div>
      <div><div style="font-size:12px;color:var(--txt);line-height:1.4">${item.title||'—'}</div>
      <div style="font-size:10px;color:var(--txt3);margin-top:2px">${item.source||''} · ${item.published||''}</div></div></div>`;
  }).join(''):`<div style="font-size:12px;color:var(--txt3)">Tidak ada berita ditemukan</div>`;
  container.innerHTML=`
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
      <div><div style="font-size:11px;color:var(--txt3);margin-bottom:4px">Overall Sentiment</div>
        <span style="display:inline-flex;align-items:center;padding:4px 12px;border-radius:99px;font-size:12px;font-weight:600;background:${ob};color:${oc}">${ol}</span></div>
      <div style="text-align:right"><div style="font-size:11px;color:var(--txt3);margin-bottom:2px">News Score</div>
        <div style="font-size:20px;font-weight:600;font-family:'DM Mono',monospace;color:${oc}">${news.skor_normalized||5}/10</div></div>
    </div>
    <div class="grid2" style="margin-bottom:14px">
      <div class="kpi"><div class="kpi-lbl">Skor Korporasi</div>
        <div class="kpi-val" style="color:${(news.skor_korporasi||0)>=0?'var(--green-t)':'var(--red-t)'}">${(news.skor_korporasi||0)>=0?'+':''}${news.skor_korporasi||0}</div></div>
      <div class="kpi"><div class="kpi-lbl">Skor Makro</div>
        <div class="kpi-val" style="color:${(news.skor_makro||0)>=0?'var(--green-t)':'var(--red-t)'}">${(news.skor_makro||0)>=0?'+':''}${news.skor_makro||0}</div></div>
    </div>
    ${wHTML}
    <div class="sec">Kategori Terdeteksi (${matches.length})</div>${mHTML}
    <div class="sec">Headline Terbaru (${items.length} berita)</div>${hHTML}`;
}

function destroyCharts(){
  if(chartPrice){chartPrice.destroy();chartPrice=null;}
  if(chartDiv){chartDiv.destroy();chartDiv=null;}
}

loadData();
</script>
</body>
</html>
